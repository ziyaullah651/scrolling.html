<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>No More Scrolling — App Timer (PWA)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1724"/>
<style>
body {
  margin:0; background: radial-gradient(circle at top, #0a0f1f, #000);
  color:#fff; font-family:Arial; padding:20px;
}
.container { 
  backdrop-filter: blur(18px); 
  background: rgba(255,255,255,0.08); 
  border-radius:20px; 
  padding:20px; 
  box-shadow:0 8px 32px rgba(0,0,0,0.4); 
}
button{background:#7f5af0; padding:10px 16px; border:none; color:#fff; border-radius:10px;}
</style>
</head>
<body>
<div class="container">
  <h1>No More Scrolling – App Timer</h1>
  <p>Your updated glass + neon UI is active.</p>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
